paths:
  /activity:
    get:
      summary: Get account activity
      description: |
        Returns paginated activity in reverse order (most recent first).

        Activity is an immutable event log. Every single account event yields an activity object.

        The API key used to access this method affects what activity rows are returned: activity rows
        corresponding to test orders for the test API key, the rest of the rows (both activity rows
        corresponding to live orders or not having any order associated with them) for the live API key.
      operationId: getActivity
      security:
        - BearerAuth: []
      tags:
        - Activity
      parameters:
        - name: limit
          in: query
          description:
            Default is 10.

            Maximum number of resources to return, between 1 and 100.
          schema:
            type: string
            pattern: '^\d+$'
            example: '50'
        - name: after
          in: query
          description: |
            A cursor for use in pagination.

            *after* is an object ID that defines your place in the list.

            For instance, if you make a list request and receive 100 objects, ending with *foo*, your subsequent call can include *after=foo* in order to fetch the next page of the list.
          schema:
            type: string
            example: 0vE213P96LbXNap56NAqVoM7knOedQg4
      responses:
        '200':
          description: The response returns paginated activity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActivity'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized. The API Key is invalid or disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '429':
          description: Rate limit exceeded
  /accounts/me:
    get:
      summary: Get account
      description: |
        Returns the account linked to the API Key.

        One account object is returned.
      operationId: getAccount
      security:
        - BearerAuth: []
      tags:
        - Accounts
      responses:
        '200':
          description: The response returns an account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '401':
          description: Unauthorized. The API Key is invalid or disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '429':
          description: Rate limit exceeded
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  /analytics:
    get:
      summary: Get analytics
      description: |
        Returns analytics for a specified time period for the account linked to the API Key.

        Defaults to the last 30 days if no time period is specified.
      operationId: getAnalytics
      security:
        - BearerAuth: [ ]
      tags:
        - Analytics
      parameters:
        - name: start
          in: query
          description:
            The start date of the custom date range.

            The date must be in the format YYYY-MM-DD.
          schema:
            type: string
            format: date
            example: '2019-01-01'
        - name: end
          in: query
          description:
            The end date of the custom date range.

            The date must be in the format YYYY-MM-DD.
          schema:
            type: string
            format: date
            example: '2020-01-31'
      responses:
        '200':
          description: The response return account analytics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Analytics'
        '401':
          description: Unauthorized. The API Key is invalid or disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '429':
          description: Rate limit exceeded
  /bundles:
    get:
      summary: Get bundles
      description: |
        Returns paginated bundles.

        Bundle represent a group of projects of similar unit price and characteristics.

        Orders are placed against bundles.

        Disabled bundles are not returned unless `recently_disabled` is used.
        Disabled bundle projects are not returned unless `recently_disabled` is used.
      operationId: getBundles
      security:
        - BearerAuth: []
      tags:
        - Projects
      parameters:
        - name: limit
          in: query
          description:
            Default is 10.

            Maximum number of resources to return, between 1 and 100.
          schema:
            type: string
            pattern: '^\d+$'
            example: '50'
        - name: after
          in: query
          description: |
            A cursor for use in pagination.

            *after* is an object ID that defines your place in the list.

            For instance, if you make a list request and receive 100 objects, ending with *foo*, your subsequent call can include *after=foo* in order to fetch the next page of the list.
          schema:
            type: string
            example: 0vE213P96LbXNap56NAqVoM7knOedQg4
        - name: recently_disabled
          in: query
          description:
            When `recently_disabled` is set to true, the response will also include bundles which have been disabled in the last 30 days.

            Default is false.

            Omitting or setting recently_disabled to false has the same effect.
          schema:
            type: boolean
            example: true
      responses:
        '200':
          description: The response returns paginated bundles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBundles'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized. The API Key is invalid or disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '429':
          description: Rate limit exceeded
  /bundles/{id}:
    get:
      summary: Get a bundle
      description: |
        Returns a bundle by id if it exists.

        Bundle represent a group of projects of similar unit price and characteristics.

        Orders are placed against bundles.
      operationId: getBundleById
      security:
        - BearerAuth: []
      tags:
        - Projects
      parameters:
        - name: id
          in: path
          required: true
          description: The bundle's unique identifier
          schema:
            type: string
            example: 'ljmkOq7vXd239gAE9WALWQ8ZGVD5ExNz'
      responses:
        '200':
          description: The response returns a bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bundle'
        '404':
          description: The bundle does not exist
        '429':
          description: Rate limit exceeded
  /projects:
    get:
      summary: Get projects
      description: |
        Returns paginated projects.

        Disabled projects are not returned unless `recently_disabled` is used.
        Disabled project bundles are not returned unless `recently_disabled` is used.

        Note: orders are placed against bundles not projects.
      operationId: getProjects
      security:
        - BearerAuth: []
      tags:
        - Projects
      parameters:
        - name: limit
          in: query
          description:
            Default is 10.

            Maximum number of resources to return, between 1 and 100.
          schema:
            type: string
            pattern: '^\d+$'
            example: '50'
        - name: after
          in: query
          description: |
            A cursor for use in pagination.

            *after* is an object ID that defines your place in the list.

            For instance, if you make a list request and receive 100 objects, ending with *foo*, your subsequent call can include *after=foo* in order to fetch the next page of the list.
          schema:
            type: string
            example: 0vE213P96LbXNap56NAqVoM7knOedQg4
        - name: recently_disabled
          in: query
          description:
            When `recently_disabled` is set to true, the response will also include bundles which have been disabled in the last 30 days.

            Default is false.

            Omitting or setting recently_disabled to false has the same effect.
          schema:
            type: boolean
            example: true
      responses:
        '200':
          description: The response returns paginated projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjects'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized. The API Key is invalid or disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '429':
          description: Rate limit exceeded
  /projects/{id}:
    get:
      summary: Get a project by id
      description: |
        Returns a project by id if it exists.

        Disabled projects are returned.
      operationId: getProjectById
      security:
        - BearerAuth: []
      tags:
        - Projects
      parameters:
        - name: id
          in: path
          required: true
          description: The project's unique identifier
          schema:
            type: string
            example: 1vE213P96LbXNap56NAqVoM7knOedQg4
      responses:
        '200':
          description: The response returns a project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: The project does not exist
        '429':
          description: Rate limit exceeded
  /projects/by-slug/{slug}:
    get:
      summary: Get a project by slug
      description: |
        Returns a project by slug if it exists.

        Disabled projects are returned.
      operationId: getProjectBySlug
      security:
        - BearerAuth: []
      tags:
        - Projects
      parameters:
        - name: slug
          in: path
          required: true
          description: The project's unique slug
          schema:
            type: string
            example: 'alto-mayo'
      responses:
        '200':
          description: The response returns a project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: The project does not exist
        '429':
          description: Rate limit exceeded
  /orders/by-mass:
    post:
      summary: Create an order by mass
      description: Create an order to purchase carbon offset by specifying a mass in tonnes or kilograms.
      operationId: createOrderByMass
      security:
        - BearerAuth: []
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderByQuantityRequest'
      responses:
        '200':
          description: |
            Order created successfully.
            The response returns an Order object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderByQuantity'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized. The API Key is invalid or disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '409':
          description: |
            Conflict

            Examples:
              1. account is suspended
              2. order idempotency failure: an order with the same idempotency_key has already by created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '415':
          description: The request is not an application/json encoded request
        '429':
          description: Rate limit exceeded
  /orders/by-value:
    post:
      summary: Create an order by value
      description: Create an order to purchase carbon offset by specifying a maximum purchase value.
      operationId: createOrderByValue
      security:
        - BearerAuth: []
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderByValueRequest'
      responses:
        '200':
          description: |
            Order created successfully.
            The response returns an Order object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderByValue'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized. The API Key is invalid or disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '409':
          description: |
            Conflict

            Examples:
              1. account is suspended
              2. order idempotency failure: an order with the same idempotency_key has already by created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '415':
          description: The request is not an application/json encoded request
        '429':
          description: Rate limit exceeded
  /orders:
    get:
      summary: Get orders
      description: |
          Returns paginated account orders ordered by creation date descending

          The API key used to access this method affects what orders are returned: test orders for the test
          API key, live orders for the live one.
      operationId: getOrders
      security:
        - BearerAuth: []
      tags:
        - Orders
      parameters:
        - name: limit
          in: query
          description:
            Default is 10.

            Maximum number of resources to return, between 1 and 100.
          schema:
            type: string
            pattern: '^\d+$'
            example: '50'
        - name: after
          in: query
          description: |
            A cursor for use in pagination.

            *after* is an object ID that defines your place in the list.

            For instance, if you make a list request and receive 100 objects, ending with *foo*, your subsequent call can include *after=foo* in order to fetch the next page of the list.
          schema:
            type: string
            example: 0vE213P96LbXNap56NAqVoM7knOedQg4
        - name: offset_link_id
          in: query
          description: |
            Filter orders by offset_link_id.


            If offset_link_id is set, the response will only include orders belonging to the particular offset link.
          schema:
            type: string
            example: ke56XR3wK72raAe6ZPyEDQzgWldPBO41
      responses:
        '200':
          description: The response returns paginated orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrders'
        '401':
          description: Unauthorized. The API Key is invalid or disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '429':
          description: Rate limit exceeded
  /orders/{id}:
    get:
      summary: Get an order
      description: |
        Returns an order by id if it exists.
      operationId: getOrderById
      security:
        - BearerAuth: []
      tags:
        - Orders
      parameters:
