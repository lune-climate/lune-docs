          description: Carbon offset purchased (tonnes CO2)
        unit_price:
          type: string
          description: |
            Project unit price per tonne CO2

            Unit: order currency
          pattern: '^[0-9]+(\.[0-9]+)?$'
          example: '6.09'
        offset_cost:
          type: string
          description: |
            Represents the net cost of offsets purchased by the order for this project.

            Unit: order currency
          pattern: '^[0-9]+(\.[0-9]+)?$'
          example: '7176.00'
    OrderBundle:
      type: object
      required:
        - bundle_id
        - bundle_name
        - quantity
        - unit_price
        - gross_unit_price
        - offset_cost
      properties:
        bundle_id:
          type: string
          description: The bundle's unique identifier
          example: va1BEV2VZqnzPkYxJgALg0GeQDoXlWO5
        bundle_name:
          type: string
          description: The bundle's name
          example: 'Latin America Forestry'
        quantity:
          type: string
          pattern: '^[0-9]+(\.[0-9]+)?$'
          example: '1040'
          description: Quantity for the specific bundle (tonnes CO2)
        unit_price:
          type: string
          description: |
            Bundle unit price per tonne CO2

