components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Authorization Bearer API Key (see <a href="#section/Authentication">Authentication</a>)
    AccessToken:
      type: apiKey
      in: query
      name: access_token
      description: |
        An API key used to access a resource that accepts it in the URL.

        Note: Lune API keys are not URL-safe, which means that they can't be included in URLs directly.
        They need to be percent-encoded using a function like JavaScript's [`encodeURIComponent()`](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/encodeURIComponent) or
        Python's [`urllib.parse.quote()`](https://docs.python.org/3/library/urllib.parse.html#urllib.parse.quote).
  schemas:
    ElectricityConsumption:
      type: object
      required:
        - amount
        - unit
      properties:
        amount:
          type: string
          pattern: '^[0-9]+(\.[0-9]+)?$'
          example: '40.501'
        unit:
          type: string
          enum:
            - kWh
            - MWh
            - GWh
          example: 'MWh'
          description: Unit, `kWh` for kilowatt-hours, `MWh` for megawatt-hours, `GWh` for gigawatt-hours
    Mass:
      type: object
      required:
        - amount
        - unit
      properties:
        amount:
          type: string
          pattern: '^[0-9]+(\.[0-9]+)?$'
          example: '40.501'
        unit:
          type: string
          enum:
            - kg
            - t
          example: 'kg'
          description: Unit, `t` for tonne, `kg` for kilogram
    Distance:
      type: object
      required:
        - amount
        - unit
      properties:
        amount:
          type: string
          pattern: '^[0-9]+(\.[0-9]+)?$'
          example: '40.501'
        unit:
          type: string
          enum:
            - km
            - mi
          example: 'km'
          description: Unit, `km` for kilometers, `mi` for miles
    Area:
      type: object
      required:
        - amount
        - unit
      properties:
        amount:
          type: string
          pattern: '^[0-9]+(\.[0-9]+)?$'
          example: '40.501'
        unit:
          type: string
          enum:
            - square_meters
            - square_feet
          example: 'square_meters'
    Errors:
      type: array
      description: An array containing errors
      items:
        $ref: '#/components/schemas/Error'
    Error:
      type: object
      description: Individual error information
      required:
        - error_code
        - message
      properties:
        error_code:
          type: string
          description: Immutable string representing a specific error.
          example: account_suspended
          enum:
            - account_suspended
            - bundle_selection_not_100_pct
            - order_idempotency_failure
            - order_low_volume_no_split
            - invalid_bundle_id
            - invalid_id
            - validation_error
            - percentage_all_or_none
            - address_not_found
            - at_least_one_constraint_required
            - bundles_size_not_supported
            - unknown_imo_number
            - webhook_limit_reached
            - invalid_time_range
            - exchange_rate_not_found
        message:
          type: string
          description: |
              Human readable error message.

              This value can contain some extra information about the error in
              human-readable form. Not suitable for programmatic consumption, the format
              is not guaranteed to be stable.
    OffsetValueSeriesItem:
      type: object
      required:
        - date
        - value
      properties:
        date:
          type: string
          format: date
          example: "2021-09-09"
        value:
          type: string
          example: '333.66'
          pattern: '^[0-9]+(\.[0-9]+)?$'
    OffsetQuantitySeriesItem:
      type: object
      required:
        - date
        - quantity
      properties:
        date:
            type: string
            format: date
            example: "2021-09-09"
        quantity:
          type: string
          example: '222.667'
          pattern: '^[0-9]+(\.[0-9]+)?$'
    OrderQuoteByQuantityRequest:
      type: object
      description: Order by Quantity details
      required:
        - mass
      properties:
        mass:
          description: Mass of CO2 offsets to purchase
          allOf:
            - $ref: '#/components/schemas/Mass'
        bundle_selection:
          $ref: '#/components/schemas/BundleSelectionRequest'
    CreateOrderByQuantityRequest:
      type: object
      description: Order by Quantity details
      required:
        - mass
      properties:
        mass:
          description: Mass of CO2 offsets to purchase
          allOf:
            - $ref: '#/components/schemas/Mass'
        idempotency_key:
          type: string
          maxLength: 100
          example: 5bd808a954e
          description: |
            Optional unique identifier provided by the client.

            `idempotency_key` has two purposes:
            1. Clients can safely retry order requests without accidentally performing the same operation twice. The current state of the original order is returned.
            2. Clients can use `idempotency_key` to reconcile orders with other entities on their system.
        bundle_selection:
          $ref: '#/components/schemas/BundleSelectionRequest'
        metadata:
          $ref: '#/components/schemas/Metadata'
    OrderQuoteByValueRequest:
      type: object
      description: Order by Value details
      required:
        - value
      properties:
        value:
          type: string
          pattern: '^[0-9]+(\.[0-9]+)?$'
          example: '7700.00'
          description: Maximum price of CO2 offsets to purchase (in the account's currency)
        bundle_selection:
          $ref: '#/components/schemas/BundleSelectionRequest'
    CreateOrderByValueRequest:
      type: object
      description: Order by Value details
      required:
        - value
      properties:
        value:
          type: string
          pattern: '^[0-9]+(\.[0-9]+)?$'
          example: '7700.00'
          description: Maximum price of CO2 offsets to purchase (in the account's currency)
        idempotency_key:
          type: string
          maxLength: 100
          example: 5bd808a954e
          description: |
            Optional unique identifier provided by the client.

            `idempotency_key` has two purposes:
            1. Clients can safely retry order requests without accidentally performing the same operation twice. The current state of the original order is returned.
            2. Clients can use `idempotency_key` to reconcile orders with other entities on their system.
        bundle_selection:
          $ref: '#/components/schemas/BundleSelectionRequest'
        metadata:
          $ref: '#/components/schemas/Metadata'
    BundleSelectionRequest:
      type: array
      description: |
        Optional allocation ratios by bundle.

        The sum of all allocation ratios must equal 100.

        If not specified, the preconfigured allocation ratios are going to be used.

        If, for each selection, `percentage` is not provided, the selection is divided equally (best effort) between bundles. `percentage` must be provided for all or none of the bundles.
      items:
        $ref: '#/components/schemas/BundlePercentageRequest'
      example:
        - bundle_id: 'BmWxrvXo29eGqzA1qjANL5PwnkgaO8R3'
          percentage: 34
        - bundle_id: 'VndoQ0PZjGMzvYOZGwqy6kbgN1eOJx9B'
          percentage: 66
    BundlePercentageRequest:
      type: object
      description: Maps a bundle id to an allocation ratio
      required:
        - bundle_id
      properties:
        bundle_id:
          type: string
          example: 'BmWxrvXo29eGqzA1qjANL5PwnkgaO8R3'
          description: The bundle's unique identifier
        percentage:
          type: integer
          example: 43
          description: Selection percentage
    BundleSelection:
      type: array
      description: |
        Optional allocation ratios by bundle.

        The sum of all allocation ratios must equal 100.

        If not specified, the preconfigured allocation ratios are going to be used.
      items:
        $ref: '#/components/schemas/BundlePercentage'
      example:
        - bundle_id: 'BmWxrvXo29eGqzA1qjANL5PwnkgaO8R3'
          percentage: 34
        - bundle_id: 'VndoQ0PZjGMzvYOZGwqy6kbgN1eOJx9B'
          percentage: 66
    BundlePercentage:
      type: object
      description: Maps a bundle id to an allocation ratio
      required:
        - bundle_id
        - percentage
      properties:
        bundle_id:
          type: string
          example: 'BmWxrvXo29eGqzA1qjANL5PwnkgaO8R3'
          description: The bundle's unique identifier
        percentage:
          type: integer
          example: 43
          description: Selection percentage
    OrderBase:
      type: object
      description: Order object
      required:
        - id
        - type
        - status
        - currency
        - created_at
        - metadata
      properties:
        id:
          type: string
          description: The order's unique identifier
          example: va1BER4JZqnzPkYxJgALg0GeQDoXlWO5
        idempotency_key:
          type: string
          maxLength: 100
          example: 5bd808a954e
          description: |
            Optional unique identifier provided by the client.

            `idempotency_key` has two purposes:
            1. Clients can safely retry order requests without accidentally performing the same operation twice. The current state of the original order is returned.
            2. Clients can use `idempotency_key` to reconcile orders with other entities on their system.
        type:
          type: string
          description: Identifies whether the order has been placed by quantity (kg CO2) or value (monetary amount)
          example: quantity
          enum:
            - quantity
            - value
        status:
          type: string
          description: Order status
          example: complete
          enum:
            - received
            - placed
            - paid
            - allocated
            - cancelled
            - complete
            - failed
        currency:
          type: string
          description: Order currency code
          example: 'GBP'
        offset_cost:
          type: string
          description: |
            Represents the net cost of offsets purchased by the order. May be lower than `requested_value`.

            This field is set when the order is linked to Bundles.

            This field is set the order's status transitions from `received` to `placed`.

            Unit: order currency
          pattern: '^[0-9]+(\.[0-9]+)?$'
          example: '7176.00'
        total_cost:
          type: string
          description: |
            The total cost for the order inclusive of fees.

            Unit: order currency
          pattern: '^[0-9]+(\.[0-9]+)?$'
          example: '7696.00'
        commission:
          type: string
          description: |
            Represents Lune's fee.

            This field is set when the order is linked to Bundles.

            This field is set the order's status transitions from `received` to `placed`.

            Unit: order currency
          pattern: '^[0-9]+(\.[0-9]+)?$'
          example: '520.00'
        quantity:
          type: string
          pattern: '^[0-9]+(\.[0-9]+)?$'
          example: '1040'
          description: Quantity of CO2 offsets purchased in tonnes.
        created_at:
          type: string
          format: date-time
          description: Order creation timestamp
        bundles:
          type: array
          description: |
            bundles are set when the order's status is `placed`, `paid`, `allocated` or `complete`.

            Represents the bundles associated with the order including their relative quantity and cost breakdown.
          items:
            $ref: '#/components/schemas/OrderBundle'
        projects:
          type: array
          description: |
            Projects are set when the order's status is `allocated` or `complete`.

            Represents the projects associated with the order including their relative quantity and cost breakdown.

            Orders are placed against bundles, not projects. Projects in a bundle may change based on supply.

            This field is set as soon as we can guarantee project supply.

          items:
            $ref: '#/components/schemas/OrderProject'
          example:
            - quantity: '600'
              unit_price: '6.90'
              offset_cost: '4140.00'
              project_id: 'gMbvJoOaX54V1wpNaRY8dWDGQ7m239Bx'
              project_name: 'Madre De Dios'
              project_type: 'Forest Conservation'
              project_slug: 'madre-de-dios'
            - quantity: '440'
              unit_price: '6.90'
              offset_cost: '3036.00'
              project_id: 'xe1BEV2VZqnzPkYxJgALg0GeQDoXlWO5'
              project_name: 'Alto Mayo'
              project_type: 'Forest Conservation'
              project_slug: 'alto-mayo'
        certificate:
          type: string
          description: |
            Carbon credits certificate URL.

            This field is set when an order in 'complete' status

          example: 'https://api.lune.co/v1/orders/08QD7GPaBx5b6Y60ndAONXLvrZljRE2e/certificate'
        metadata:
          $ref: '#/components/schemas/Metadata'
        offset_link_id:
          type: string
          description: The offset link identifier, if the order was placed through an offset link
          example: 'UwjfkXjfksoHXzA1qjANL58GhjwqkxpB'
        email:
          type: string
          description: |
            End-user email.

            This field is currently populated on orders placed through offset links.
          example: 'john@doe.com'
    OrderByQuantity:
      title: Order by quantity
      allOf:
        - $ref: '#/components/schemas/OrderBase'
        - type: object
          required:
            - requested_quantity
            - type
          properties:
            requested_quantity:
              type: string
              pattern: '^[0-9]+(\.[0-9]+)?$'
              example: '1045'
              description: Represents the requested quantity of CO2 offsets to purchase in tonnes.
            type:
              type: string
              description: Identifies whether the order has been placed by quantity (kg CO2) or value (monetary amount)
              example: quantity
              enum:
                - quantity
                - value
    OrderByValue:
      title: Order by value
      allOf:
        - $ref: '#/components/schemas/OrderBase'
        - type: object
          required:
            - requested_value
            - type
          properties:
            requested_value:
              description: |
                Represents the requested value of CO2 offsets to purchase.

                Unit: order currency
              type: string
              pattern: '^[0-9]+(\.[0-9]+)?$'
              example: '7700'
            type:
              type: string
              description: Identifies whether the order has been placed by quantity (kg CO2) or value (monetary amount)
              example: quantity
              enum:
                - quantity
                - value
    Order:
      type: object
      oneOf:
          - $ref: '#/components/schemas/OrderByQuantity'
          - $ref: '#/components/schemas/OrderByValue'
      discriminator:
        propertyName: type
        mapping:
          quantity: '#/components/schemas/OrderByQuantity'
          value: '#/components/schemas/OrderByValue'
      required:
        - type
      properties:
        type:
          type: string
          description: Identifies whether the order has been placed by quantity (kg CO2) or value (monetary amount)
          example: quantity
          enum:
            - quantity
            - value
    OrderProject:
